<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PDF Compressor | ToolHub</title>

    <meta name="description"
        content="Compress PDF files online for free. Fast, secure and easy PDF compression with ToolHub.">

    <link rel="stylesheet" href="pdf-compressor.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="https://kit.fontawesome.com/6f9f7f7b39.js" crossorigin="anonymous"></script>

</head>

<body>

    <div class="container">

        <!-- Header -->

        <div class="tool-header">

            <div class="icon">

                <i class="fa-solid fa-file-pdf"></i>

            </div>

            <h1>PDF Compressor</h1>

            <p>
                Reduce PDF file size quickly while keeping your documents organized.
            </p>

        </div>

        <!-- Upload Area -->

        <div class="upload-box" id="dropZone">

            <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>

            <h2>Drag & Drop PDF Here</h2>

            <p>or click below to choose a file</p>

            <input
                type="file"
                id="fileInput"
                accept=".pdf"
                hidden
            >

            <button id="chooseFile">

                <i class="fa-solid fa-folder-open"></i>

                Choose PDF

            </button>

        </div>

        <!-- File Info -->

        <div class="file-info" id="fileInfo">

            <div class="info-row">

                <span>File Name</span>

                <strong id="fileName">No file selected</strong>

            </div>

            <div class="info-row">

                <span>File Size</span>

                <strong id="fileSize">0 KB</strong>

            </div>

        </div>

        <!-- Compression Options -->

        <div class="compression-box">

            <label for="quality">

                Compression Level

            </label>

            <select id="quality">

                <option value="low">
                    Low Compression
                </option>

                <option value="medium" selected>
                    Medium Compression
                </option>

                <option value="high">
                    High Compression
                </option>

            </select>

        </div>

        <!-- Progress -->

        <div class="progress-section">

            <div class="progress-bar">

                <div
                    class="progress"
                    id="progress"
                ></div>

            </div>

            <p id="status">

                Waiting for file...

            </p>

        </div>

        <!-- Buttons -->

        <div class="buttons">

            <button id="compressBtn">

                <i class="fa-solid fa-compress"></i>

                Compress PDF

            </button>

            <a
                id="downloadBtn"
                href="#"
                download="compressed.pdf"
            >

                <i class="fa-solid fa-download"></i>

                Download PDF

            </a>

        </div>

        <!-- Back -->

        <div class="back-home">

            <a href="../index.html">

                <i class="fa-solid fa-house"></i>

                Back to Home

            </a>

        </div>

    </div>

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <script src="pdf-compressor.js"></script>

</body>

</html>
