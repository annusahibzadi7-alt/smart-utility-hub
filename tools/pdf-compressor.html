<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF Compressor V4</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="pdf-compressor.css">
</head>

<body>

<div class="card">

    <h1>PDF Compressor V4</h1>
    <p>Compress & download your PDF instantly</p>

    <div id="dropZone" class="drop-zone">
        <p>Drag & Drop PDF or Click</p>
        <input type="file" id="fileInput" accept="application/pdf" hidden>
    </div>

    <div id="info"></div>

    <button onclick="compressPDF()">Compress PDF</button>

    <a id="downloadLink" style="display:none;" download="compressed.pdf">
        Download PDF
    </a>

</div>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="pdf-compressor.js"></script>

</body>
</html>
